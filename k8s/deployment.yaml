# Autor: Jean Pierre Azabache
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: morgantrace-api
  namespace: default
  labels:
    app: morgantrace
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: morgantrace
  template:
    metadata:
      labels:
        app: morgantrace
        version: "1.0.0"
    spec:
      containers:
        - name: morgantrace-api
          # Imagen cargada en el registro local de k3d
          image: localhost:5050/morgantrace:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MODEL_PATH
              value: "src/models/model.pkl"
            - name: PYTHONUNBUFFERED
              value: "1"
          # Sondas de salud para Kubernetes
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Límites de recursos para cluster local k3d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
