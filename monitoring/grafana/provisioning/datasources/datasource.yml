# ─────────────────────────────────────────────────────────────────────────────
# Grafana — Datasource Prometheus (auto-provisionado)
# Grafana carga esta configuración al arrancar, sin necesidad de configuración manual.
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
