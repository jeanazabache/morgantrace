# ─────────────────────────────────────────────────────────────────────────────
# MorganTrace — Docker Compose
# Orquestación local para desarrollo y pruebas
# Autor: Jean Pierre Azabache
#
# Servicios:
#   morgantrace-api  → http://localhost:8000  (API + Swagger en /docs)
#   mlflow           → http://localhost:5000  (tracking de experimentos ML)
#   prometheus       → http://localhost:9090  (recolección de métricas)
#   grafana          → http://localhost:3000  (dashboards — admin/admin)
# ─────────────────────────────────────────────────────────────────────────────
services:
  morgantrace-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morgantrace-api
    ports:
      - "8000:8000"
    volumes:
      - ./src/models:/app/src/models   # modelo entrenado (no se sube a git)
      - audit_logs:/app/logs           # logs de auditoría persistentes
    environment:
      - MODEL_PATH=src/models/model.pkl
      - AUDIT_LOG_PATH=logs/predicciones.jsonl
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mlflow:
    image: python:3.11-slim
    container_name: morgantrace-mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: morgantrace-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - morgantrace-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: morgantrace-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/morgantrace.json
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mlflow_data:
    driver: local
  audit_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
